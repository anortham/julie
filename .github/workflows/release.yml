name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v2.0.0

permissions:
  contents: write  # Required for creating releases

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Server binary builds (julie-server + julie-daemon + julie-embedding-host)
  #
  # Post-cutover (Phase 3c.3/3d) the plugin spawns julie-server directly:
  #   - julie-server: the MCP entry point; serves in-process over stdio
  #     (leader-locked, no daemon fork). This is what your client spawns.
  #   - julie-embedding-host: resident process owning the shared embedding
  #     sidecar; julie-server locates this sibling binary at runtime.
  #   - julie-daemon: legacy daemon, retained during the 3d transition.
  # All three are bundled in the same archive per platform.
  # ==========================================================================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (sidecar handles CUDA/DirectML/CPU via PyTorch)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_suffix: ".exe"

          # macOS Apple Silicon (sidecar for MPS acceleration)
          - os: macos-latest
            target: aarch64-apple-darwin
            exe_suffix: ""

          # macOS Intel
          - os: macos-15-intel
            target: x86_64-apple-darwin
            exe_suffix: ""

          # Linux (sidecar for CUDA/CPU acceleration)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_suffix: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install lld (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install lld
          # Homebrew installs ld64.lld at $(brew --prefix lld)/bin/ld64.lld
          # Symlink it into /usr/local/bin so clang's -fuse-ld=lld finds it.
          LLD_PREFIX="$(brew --prefix lld)"
          echo "${LLD_PREFIX}/bin" >> "$GITHUB_PATH"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries (julie-server + julie-daemon + julie-embedding-host)
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin julie-server \
            --bin julie-daemon \
            --bin julie-embedding-host

      - name: Strip binaries (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/julie-server${{ matrix.exe_suffix }}
          strip target/${{ matrix.target }}/release/julie-daemon${{ matrix.exe_suffix }}
          strip target/${{ matrix.target }}/release/julie-embedding-host${{ matrix.exe_suffix }}

      - name: Ad-hoc codesign (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          codesign --force --sign - target/${{ matrix.target }}/release/julie-server${{ matrix.exe_suffix }}
          codesign --force --sign - target/${{ matrix.target }}/release/julie-daemon${{ matrix.exe_suffix }}
          codesign --force --sign - target/${{ matrix.target }}/release/julie-embedding-host${{ matrix.exe_suffix }}

      - name: Create archive
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          SERVER_BIN="julie-server${{ matrix.exe_suffix }}"
          DAEMON_BIN="julie-daemon${{ matrix.exe_suffix }}"
          HOST_BIN="julie-embedding-host${{ matrix.exe_suffix }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ARCHIVE="julie-v${VERSION}-${{ matrix.target }}.zip"
            cp "./target/${{ matrix.target }}/release/${SERVER_BIN}" "${SERVER_BIN}"
            cp "./target/${{ matrix.target }}/release/${DAEMON_BIN}" "${DAEMON_BIN}"
            cp "./target/${{ matrix.target }}/release/${HOST_BIN}" "${HOST_BIN}"
            7z a "${ARCHIVE}" "${SERVER_BIN}" "${DAEMON_BIN}" "${HOST_BIN}"
          else
            ARCHIVE="julie-v${VERSION}-${{ matrix.target }}.tar.gz"
            tar -czf "${ARCHIVE}" \
              -C target/${{ matrix.target }}/release \
              "${SERVER_BIN}" "${DAEMON_BIN}" "${HOST_BIN}"
          fi
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}

  # ==========================================================================
  # Create GitHub release with all artifacts
  # ==========================================================================
  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release with gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Create release notes. Prefer a checked-in versioned note when one
          # exists so contract releases do not publish generic notes.
          NOTES_PATH="docs/release-notes/v${VERSION}.md"
          if [ -f "${NOTES_PATH}" ]; then
            cp "${NOTES_PATH}" release-notes.md
          else
            cat > release-notes.md << EOF
          ## Julie v${{ steps.version.outputs.version }}

          Cross-platform code intelligence server for AI coding agents.

          ### What's Included

          Each archive ships three binaries:

          - **\`julie-server\`** — The MCP entry point your client spawns. Serves in-process over stdio (leader-locked; no daemon fork).
          - **\`julie-embedding-host\`** — Resident process that owns the shared embedding sidecar. \`julie-server\` locates this sibling binary at runtime for semantic search.
          - **\`julie-daemon\`** — Legacy daemon, retained during the daemon-teardown transition.

          ### Platform Support
          | Platform | Archive |
          |----------|---------|
          | macOS Apple Silicon | \`.tar.gz\` |
          | macOS Intel | \`.tar.gz\` |
          | Windows x86_64 | \`.zip\` |
          | Linux x86_64 | \`.tar.gz\` |

          ### Quick Start
          \`\`\`bash
          # 1. Extract the archive for your platform; all three binaries land in the same directory.
          # 2. Configure your MCP client to spawn julie-server.
          # 3. julie-server serves in-process and spawns julie-embedding-host as needed.
          \`\`\`

          See [README.md](https://github.com/${{ github.repository }}) for full documentation.
          EOF
          fi

          # Create release
          gh release create "v${VERSION}" \
            --title "Julie v${VERSION}" \
            --notes-file release-notes.md

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Upload all artifacts
          cd artifacts
          for dir in */; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                echo "Uploading $(basename "$file")..."
                gh release upload "v${VERSION}" "$file" --clobber
              fi
            done
          done

      - name: Verify Release
        run: |
          echo "Release v${{ steps.version.outputs.version }} created successfully"
          echo ""
          echo "Bundled binaries: julie-server, julie-daemon, julie-embedding-host"
          echo ""
          echo "Platforms built:"
          echo "  - Windows (x86_64-pc-windows-msvc)"
          echo "  - macOS Apple Silicon (aarch64-apple-darwin)"
          echo "  - macOS Intel (x86_64-apple-darwin)"
          echo "  - Linux (x86_64-unknown-linux-gnu)"
          echo ""
          echo "View release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"

      - name: Trigger plugin update
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}
        run: |
          echo "Triggering plugin repo update for v${{ steps.version.outputs.version }}..."
          gh workflow run "Update Plugin" \
            --repo anortham/julie-plugin \
            -f version="${{ steps.version.outputs.version }}" \
            -f tag="v${{ steps.version.outputs.version }}"
