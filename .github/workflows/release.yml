name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v2.0.0

permissions:
  contents: write  # Required for creating releases

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Server binary builds (julie-server + julie-adapter + julie-daemon)
  #
  # The daemon split (A1.8) ships three binaries from the same workspace:
  #   - julie-adapter: thin stdio<->HTTP forwarder; plugins spawn this.
  #   - julie-daemon: heavy-state daemon; spawned by julie-adapter on demand.
  #   - julie-server: compatibility shim that dispatches argv to the above.
  # All three are bundled in the same archive per platform so the plugin's
  # run.cjs sees both julie-adapter (primary entrypoint) and julie-daemon
  # (used for preflight stop) after extraction.
  # ==========================================================================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (sidecar handles CUDA/DirectML/CPU via PyTorch)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_suffix: ".exe"

          # macOS Apple Silicon (sidecar for MPS acceleration)
          - os: macos-latest
            target: aarch64-apple-darwin
            exe_suffix: ""

          # macOS Intel
          - os: macos-15-intel
            target: x86_64-apple-darwin
            exe_suffix: ""

          # Linux (sidecar for CUDA/CPU acceleration)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_suffix: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install lld (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install lld
          # Homebrew installs ld64.lld at $(brew --prefix lld)/bin/ld64.lld
          # Symlink it into /usr/local/bin so clang's -fuse-ld=lld finds it.
          LLD_PREFIX="$(brew --prefix lld)"
          echo "${LLD_PREFIX}/bin" >> "$GITHUB_PATH"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries (julie-server + julie-adapter + julie-daemon)
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin julie-server \
            --bin julie-adapter \
            --bin julie-daemon

      - name: Strip binaries (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/julie-server${{ matrix.exe_suffix }}
          strip target/${{ matrix.target }}/release/julie-adapter${{ matrix.exe_suffix }}
          strip target/${{ matrix.target }}/release/julie-daemon${{ matrix.exe_suffix }}

      - name: Ad-hoc codesign (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          codesign --force --sign - target/${{ matrix.target }}/release/julie-server${{ matrix.exe_suffix }}
          codesign --force --sign - target/${{ matrix.target }}/release/julie-adapter${{ matrix.exe_suffix }}
          codesign --force --sign - target/${{ matrix.target }}/release/julie-daemon${{ matrix.exe_suffix }}

      - name: Create archive
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          SERVER_BIN="julie-server${{ matrix.exe_suffix }}"
          ADAPTER_BIN="julie-adapter${{ matrix.exe_suffix }}"
          DAEMON_BIN="julie-daemon${{ matrix.exe_suffix }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ARCHIVE="julie-v${VERSION}-${{ matrix.target }}.zip"
            cp "./target/${{ matrix.target }}/release/${SERVER_BIN}" "${SERVER_BIN}"
            cp "./target/${{ matrix.target }}/release/${ADAPTER_BIN}" "${ADAPTER_BIN}"
            cp "./target/${{ matrix.target }}/release/${DAEMON_BIN}" "${DAEMON_BIN}"
            7z a "${ARCHIVE}" "${SERVER_BIN}" "${ADAPTER_BIN}" "${DAEMON_BIN}"
          else
            ARCHIVE="julie-v${VERSION}-${{ matrix.target }}.tar.gz"
            tar -czf "${ARCHIVE}" \
              -C target/${{ matrix.target }}/release \
              "${SERVER_BIN}" "${ADAPTER_BIN}" "${DAEMON_BIN}"
          fi
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}

  # ==========================================================================
  # Create GitHub release with all artifacts
  # ==========================================================================
  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release with gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Create release notes
          cat > release-notes.md << EOF
          ## Julie v${{ steps.version.outputs.version }}

          Cross-platform code intelligence server for AI coding agents.

          ### What's Included

          Each archive ships three binaries (daemon-split architecture):

          - **\`julie-adapter\`** — Thin stdio<->HTTP forwarder. This is the MCP entry point your client should spawn.
          - **\`julie-daemon\`** — Heavy-state daemon (search, indexing, embeddings). Spawned automatically by \`julie-adapter\` on demand and shared across MCP sessions.
          - **\`julie-server\`** — Backwards-compatibility shim that dispatches argv to the adapter or daemon. Keeps existing scripts working.

          ### Platform Support
          | Platform | Archive |
          |----------|---------|
          | macOS Apple Silicon | \`.tar.gz\` |
          | macOS Intel | \`.tar.gz\` |
          | Windows x86_64 | \`.zip\` |
          | Linux x86_64 | \`.tar.gz\` |

          ### Quick Start
          \`\`\`bash
          # 1. Extract the archive for your platform; all three binaries land in the same directory.
          # 2. Configure your MCP client to spawn julie-adapter.
          # 3. Use \`julie-daemon stop|status\` for lifecycle control.
          \`\`\`

          See [README.md](https://github.com/${{ github.repository }}) for full documentation.
          EOF

          # Create release
          gh release create "v${VERSION}" \
            --title "Julie v${VERSION}" \
            --notes-file release-notes.md

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Upload all artifacts
          cd artifacts
          for dir in */; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                echo "Uploading $(basename "$file")..."
                gh release upload "v${VERSION}" "$file" --clobber
              fi
            done
          done

      - name: Verify Release
        run: |
          echo "Release v${{ steps.version.outputs.version }} created successfully"
          echo ""
          echo "Bundled binaries: julie-server, julie-adapter, julie-daemon"
          echo ""
          echo "Platforms built:"
          echo "  - Windows (x86_64-pc-windows-msvc)"
          echo "  - macOS Apple Silicon (aarch64-apple-darwin)"
          echo "  - macOS Intel (x86_64-apple-darwin)"
          echo "  - Linux (x86_64-unknown-linux-gnu)"
          echo ""
          echo "View release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"

      - name: Trigger plugin update
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}
        run: |
          echo "Triggering plugin repo update for v${{ steps.version.outputs.version }}..."
          gh workflow run "Update Plugin" \
            --repo anortham/julie-plugin \
            -f version="${{ steps.version.outputs.version }}" \
            -f tag="v${{ steps.version.outputs.version }}"
