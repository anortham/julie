name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v2.0.0

permissions:
  contents: write  # Required for creating releases

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Server binary builds (julie-server)
  # ==========================================================================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (DirectML via ORT covers all GPU vendors natively)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: julie-server.exe
            cargo_features: "--no-default-features --features embeddings-ort"

          # macOS Apple Silicon (sidecar for MPS acceleration)
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: julie-server

          # Linux (sidecar for NVIDIA/CUDA — ORT has no CUDA feature)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: julie-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} --bin julie-server ${{ matrix.cargo_features }}

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Ad-hoc codesign (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          codesign --force --sign - target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Create archive
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ARCHIVE="julie-v${VERSION}-${{ matrix.target }}.zip"
            cp "./target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${{ matrix.binary_name }}"
            7z a "${ARCHIVE}" "${{ matrix.binary_name }}"
          else
            ARCHIVE="julie-v${VERSION}-${{ matrix.target }}.tar.gz"
            tar -czf "${ARCHIVE}" -C target/${{ matrix.target }}/release ${{ matrix.binary_name }}
          fi
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}

  # ==========================================================================
  # Create GitHub release with all artifacts
  # ==========================================================================
  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release with gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Create release notes
          cat > release-notes.md << EOF
          ## Julie v${{ steps.version.outputs.version }}

          Cross-platform code intelligence server for AI coding agents.

          ### What's Included

          **\`julie-server\`** — MCP server for code intelligence (search, navigation, refactoring)
          - Download the archive for your platform, extract, and add to PATH

          ### Platform Support
          | Platform | Archive |
          |----------|---------|
          | macOS Apple Silicon | \`.tar.gz\` |
          | Windows x86_64 | \`.zip\` |
          | Linux x86_64 | \`.tar.gz\` |

          ### Quick Start
          \`\`\`bash
          # 1. Extract julie-server for your platform and add to PATH
          # 2. Configure your MCP client to use julie-server
          \`\`\`

          See [README.md](https://github.com/${{ github.repository }}) for full documentation.
          EOF

          # Create release
          gh release create "v${VERSION}" \
            --title "Julie v${VERSION}" \
            --notes-file release-notes.md

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Upload all artifacts
          cd artifacts
          for dir in */; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                echo "Uploading $(basename "$file")..."
                gh release upload "v${VERSION}" "$file" --clobber
              fi
            done
          done

      - name: Verify Release
        run: |
          echo "Release v${{ steps.version.outputs.version }} created successfully"
          echo ""
          echo "Server binary: julie-server"
          echo ""
          echo "Platforms built:"
          echo "  - Windows (x86_64-pc-windows-msvc)"
          echo "  - macOS Apple Silicon (aarch64-apple-darwin)"
          echo "  - Linux (x86_64-unknown-linux-gnu)"
          echo ""
          echo "View release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"

      - name: Trigger plugin update
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}
        run: |
          echo "Triggering plugin repo update for v${{ steps.version.outputs.version }}..."
          gh workflow dispatch update-binaries \
            --repo anortham/julie-plugin \
            --field version="${{ steps.version.outputs.version }}" \
            --field tag="v${{ steps.version.outputs.version }}"
