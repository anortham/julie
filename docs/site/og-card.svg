<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Julie Code Intelligence for AI Agents</title>
  <desc id="desc">A dark social preview card for Julie, showing code intelligence workflows for AI coding agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ff88"/>
      <stop offset="1" stop-color="#00c8ff"/>
    </linearGradient>
    <style>
      .mono { font-family: "JetBrains Mono", "SF Mono", Consolas, monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.14" stroke="#e0e0e8" stroke-width="1">
    <path d="M0 90H1200M0 180H1200M0 270H1200M0 360H1200M0 450H1200M0 540H1200"/>
    <path d="M120 0V630M240 0V630M360 0V630M480 0V630M600 0V630M720 0V630M840 0V630M960 0V630M1080 0V630"/>
  </g>
  <g transform="translate(80 95)">
    <text class="mono" x="0" y="0" font-size="88" font-weight="700" fill="#00ff88">Julie</text>
    <text class="sans" x="0" y="82" font-size="44" font-weight="700" fill="#e0e0e8">Code intelligence for AI agents</text>
    <text class="sans" x="0" y="136" font-size="30" fill="#8888a0">Search. Understand. Edit. Measure impact.</text>
    <rect x="0" y="205" width="520" height="170" rx="8" fill="#0d0d14" stroke="#2a2a38"/>
    <text class="mono" x="32" y="256" font-size="24" fill="#00ff88">fast_search("payment flow")</text>
    <text class="mono" x="32" y="304" font-size="24" fill="#e0e0e8">deep_dive("process_payment")</text>
    <text class="mono" x="32" y="352" font-size="24" fill="#00c8ff">blast_radius(files)</text>
  </g>
  <g transform="translate(720 150)" fill="none" stroke-width="4" stroke-linecap="round">
    <rect x="0" y="0" width="340" height="86" rx="8" stroke="#2a2a38" fill="#16161f"/>
    <rect x="0" y="190" width="340" height="86" rx="8" stroke="#2a2a38" fill="#16161f"/>
    <rect x="-80" y="95" width="500" height="86" rx="8" stroke="url(#line)" fill="#101018"/>
    <path d="M170 86V95M170 181V190" stroke="url(#line)"/>
    <text class="mono" x="170" y="54" font-size="24" text-anchor="middle" fill="#8888a0" stroke="none">find</text>
    <text class="mono" x="170" y="149" font-size="24" text-anchor="middle" fill="#e0e0e8" stroke="none">understand</text>
    <text class="mono" x="170" y="244" font-size="24" text-anchor="middle" fill="#8888a0" stroke="none">edit safely</text>
  </g>
</svg>
