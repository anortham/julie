category = "concept"
query = "where does a json adapter wrap null serialization behavior"
intent = "Find JsonAdapter null wrappers."
expected_any = ["moshi/src/main/java/com/squareup/moshi/JsonAdapter.kt"]
file_pattern = "moshi*/src/**"

[[cases]]
id = "alamofire-interceptor-selection"
repo = "alamofire"
category = "concept"
query = "where does a request combine session and request interceptors for retry and adaptation"
