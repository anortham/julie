# Fast local confidence buckets.
# Expected seconds are first-pass estimates for later rebalancing.
[tiers]
# Smoke: keep this tiny for frequent local runs.
smoke = ["cli", "core-database", "core-embeddings", "tools-get-context"]
dev = ["cli", "xtask-runner", "core-database", "core-embeddings", "tools-get-context", "tools-search-tantivy", "tools-search-line-file", "tools-search-ranking-format", "tools-search-context", "tools-search-text", "tools-search-hybrid", "tools-search-query", "tools-workspace", "tools-get-symbols", "tools-editing", "tools-navigation", "tools-refactoring", "tools-metrics", "tools-format-filter", "core-fast", "daemon", "dashboard"]
# System coverage kept separate from fast local buckets.
system = ["projection", "transport", "lifecycle", "workspace-runtime", "workspace-init", "integration"]
# Dogfood stays isolated because it is the long pole.
dogfood = ["tools-dogfood-repo-index", "search-quality"]
full = ["cli", "xtask-runner", "core-database", "core-embeddings", "tools-get-context", "tools-search-tantivy", "tools-search-line-file", "tools-search-ranking-format", "tools-search-context", "tools-search-text", "tools-search-hybrid", "tools-search-query", "tools-workspace", "tools-get-symbols", "tools-editing", "tools-navigation", "tools-refactoring", "tools-metrics", "tools-format-filter", "core-fast", "daemon", "dashboard", "projection", "transport", "lifecycle", "workspace-runtime", "workspace-init", "integration", "tools-dogfood-repo-index", "search-quality"]

[blocked_tiers]

[buckets.cli]
# CLI argument parsing, execution core, and end-to-end integration tests.
expected_seconds = 45
timeout_seconds = 120
scope_label = "cli"
notes = "CLI contract and execution path"
commands = [
  "cargo nextest run --lib tests::cli_tests",
  "cargo nextest run --lib tests::cli_execution_tests",
  "cargo nextest run --lib tests::cli_tools_tests",
  "cargo build",
  "cargo nextest run --lib --run-ignored only tests::cli::",
]

[buckets.xtask-runner]
# xtask's own tests stay out of CLI so a runner edit does not rebuild unrelated CLI paths.
expected_seconds = 5
timeout_seconds = 30
scope_label = "tooling"
notes = "xtask runner and manifest contract"
commands = ["cargo nextest run -p xtask"]

