# Fast local confidence buckets.
# Expected seconds are first-pass estimates for later rebalancing.
[tiers]
# Nano: smallest possible confidence slice for the tight edit-test loop.
nano = ["core-database", "core-fast"]
# Fast: local confidence tier (≤60s declared). Membership mirrors nano.
# Task 6 (2026-07-21): expected_seconds recalibrated from warm p50/p95 evidence.
fast = ["core-database", "core-fast"]
# Smoke: keep this tiny for frequent local runs.
smoke = ["cli", "core-database", "core-embeddings", "tools-get-context-pipeline"]
# Dev: fast branch-level gate. Keep under 10 minutes expected; full keeps broad coverage.
dev = ["cli", "xtask-runner", "core-database", "core-embeddings", "core-index", "core-pipeline", "core-runtime", "tools-get-context-pipeline", "tools-get-context-format", "tools-get-context-graph", "tools-search-tantivy", "tools-search-zero-hit", "tools-search-promotion", "tools-search-context", "tools-search-text", "tools-search-hybrid", "tools-search-query", "tools-get-symbols", "tools-deep-dive", "tools-fast-refs", "tools-blast-spillover", "tools-metrics", "tools-format-filter", "core-fast", "core-handler-telemetry", "registry", "dashboard"]
# System coverage kept separate from fast local buckets.
system = ["projection", "workspace-runtime", "workspace-init", "documentation-indexing", "integration"]
# Dogfood stays isolated because it is the long pole.
dogfood = ["tools-dogfood-repo-index", "search-quality"]
full = ["cli", "xtask-runner", "xtask-eval", "core-database", "core-embeddings", "core-index", "core-pipeline", "core-runtime", "tools-get-context-pipeline", "tools-get-context-format", "tools-get-context-graph", "tools-search-tantivy", "tools-search-line-core", "tools-search-line-filters", "tools-search-line-primary", "tools-search-file-mode", "tools-search-zero-hit", "tools-search-promotion", "tools-search-format-quality", "tools-search-context", "tools-search-text", "tools-search-hybrid", "tools-search-query", "tools-search-unified", "tools-workspace-discovery", "tools-workspace-indexing", "tools-workspace-management", "tools-workspace-targeting", "tools-get-symbols", "tools-editing", "tools-deep-dive", "tools-call-path", "tools-fast-refs", "tools-blast-spillover", "tools-refactoring", "tools-metrics", "tools-format-filter", "core-fast", "core-handler-telemetry", "registry", "dashboard", "projection", "workspace-runtime", "workspace-init", "documentation-indexing", "integration", "tools-dogfood-repo-index", "search-quality", "extractor-dep-integration"]

