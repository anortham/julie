# Fast local confidence buckets.
# Expected seconds are first-pass estimates for later rebalancing.
[tiers]
# Nano: smallest possible confidence slice for the tight edit-test loop.
nano = ["core-database", "core-fast"]
# Smoke: keep this tiny for frequent local runs.
smoke = ["cli", "core-database", "core-embeddings", "tools-get-context-pipeline"]
dev = ["cli", "xtask-runner", "core-database", "core-embeddings", "core-index", "core-pipeline", "tools-get-context-pipeline", "tools-get-context-format", "tools-get-context-graph", "tools-search-tantivy", "tools-search-line", "tools-search-file-mode", "tools-search-zero-hit", "tools-search-promotion", "tools-search-format-quality", "tools-search-context", "tools-search-text", "tools-search-hybrid", "tools-search-query", "tools-search-unified", "tools-workspace", "tools-workspace-targeting", "tools-get-symbols", "tools-editing", "tools-deep-dive", "tools-call-path", "tools-fast-refs", "tools-blast-spillover", "tools-refactoring", "tools-metrics", "tools-format-filter", "core-fast", "core-handler-telemetry", "daemon", "dashboard", "extractor-dep-integration"]
# System coverage kept separate from fast local buckets.
system = ["projection", "transport", "lifecycle", "workspace-runtime", "workspace-init", "documentation-indexing", "integration"]
# Dogfood stays isolated because it is the long pole.
dogfood = ["tools-dogfood-repo-index", "search-quality"]
full = ["cli", "xtask-runner", "core-database", "core-embeddings", "core-index", "core-pipeline", "tools-get-context-pipeline", "tools-get-context-format", "tools-get-context-graph", "tools-search-tantivy", "tools-search-line", "tools-search-file-mode", "tools-search-zero-hit", "tools-search-promotion", "tools-search-format-quality", "tools-search-context", "tools-search-text", "tools-search-hybrid", "tools-search-query", "tools-search-unified", "tools-workspace", "tools-workspace-targeting", "tools-get-symbols", "tools-editing", "tools-deep-dive", "tools-call-path", "tools-fast-refs", "tools-blast-spillover", "tools-refactoring", "tools-metrics", "tools-format-filter", "core-fast", "core-handler-telemetry", "daemon", "dashboard", "projection", "transport", "lifecycle", "workspace-runtime", "workspace-init", "documentation-indexing", "integration", "tools-dogfood-repo-index", "search-quality", "extractor-dep-integration"]

