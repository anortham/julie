[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "::",   # path separator
    "->",   # return type
    "=>",   # match arm
    "?",    # try operator
    "<>",   # generics
    "'",    # lifetime prefix
    "#[",   # attribute start
    "#![",  # inner attribute
]

# Naming conventions to recognize
naming_styles = ["snake_case", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "try_",
    "into_",
    "as_",
    "from_",
    "to_",
    "is_",
    "has_",
    "_mut",
    "_ref",
    "_unchecked",
]

[variants]
strip_prefixes = []
strip_suffixes = ["_impl", "_trait", "_fn"]

[scoring]
important_patterns = [
    "pub fn",
    "pub struct",
    "pub enum",
    "pub trait",
    "impl",
    "async fn",
]

[embeddings]
# Default: global EMBEDDABLE_KINDS only, variable_ratio = 0.20
extra_kinds = []

[annotation_classes]

[annotation_classes.test]
test_case = ["test", "tokio::test", "rstest"]

[test_evidence]
assertion_identifiers = ["assert_eq", "assert_ne", "assert", "assert_matches", "debug_assert"]
error_assertion_identifiers = ["should_err", "should_panic"]
mock_identifiers = []

[early_warnings]
schema_version = 1

# String-literal carrier vocabulary (Miller bridge Phase 3b). Keys are lowercased
# at build time and matched case-insensitively; dotted entries match exactly,
# bare entries match any receiver via the gate's last-segment rule.
[literal_carriers]
# reqwest/ureq convenience free-fns take the URL string literal directly. Dotted
# (qualifier.name) so generic `.get`/`.post` methods on arbitrary receivers don't
# flood. The builder/method form (`client.get(url)`) is intentionally not bare.
url = [
    "reqwest.get",   # reqwest::get / ::post / ::head convenience fns
    "reqwest.post",
    "reqwest.head",
    "ureq.get",      # ureq
    "ureq.post",
]
# rusqlite/sqlx SQL verbs are called on connection/transaction receivers whose
# names vary (conn, tx, db) — bare entries match any receiver via last-segment.
# sqlx::query (scoped) yields carrier `sqlx.query`, last-segment `query`, so the
# bare `query` entry covers it too. Verbs are distinctive enough not to flood.
sql = [
    "query",          # sqlx::query, conn.query
    "query_as",       # sqlx::query_as
    "query_scalar",   # sqlx::query_scalar
    "execute",        # rusqlite conn.execute, sqlx
    "prepare",        # rusqlite conn.prepare
    "query_row",      # rusqlite
    "query_map",      # rusqlite
    "batch_execute",  # diesel/rusqlite
]
route = []
