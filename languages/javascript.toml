[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "?.",   # optional chaining
    "??",   # nullish coalescing
    "===",  # strict equality
    "!==",  # strict inequality
    "=>",   # arrow function
    "...",  # spread operator
    "&&",   # logical and
    "||",   # logical or
]

# Naming conventions to recognize
naming_styles = ["camelCase", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is",
    "has",
    "can",
    "should",
    "get",
    "set",
    "on",
    "handle",
    "_",
    "__",
]

[variants]
strip_prefixes = ["_", "__"]
strip_suffixes = ["Handler", "Listener", "Callback"]

[scoring]
important_patterns = [
    "export function",
    "export default",
    "export class",
    "module.exports",
    "async function",
    "class ",
]

[embeddings]
extra_kinds = ["export"]
variable_ratio = 0.50  # arrow functions, const exports

[annotation_classes]
entrypoint = [
    "controller",
    "get",
    "post",
    "put",
    "delete",
    "patch",
]
auth = ["useguards"]

[early_warnings]
schema_version = 1

# String-literal call-arg carriers (Miller bridge Phase 3). The carrier is the
# callee text: a bare function name, or the `object.method` join for member
# calls. Bare entries match any receiver via the gate's last-segment rule;
# dotted entries match that exact `object.method`. Case-insensitive (lowercased
# at load). JS shares the TypeScript ecosystem, so this mirrors typescript.toml.
[literal_carriers]
url = [
    "fetch",          # WHATWG Fetch (browser / Node 18+ global)
    "$fetch",         # ofetch (Nuxt global alias)
    "axios",          # axios (callable instance)
    "axios.get",      # axios
    "axios.post",     # axios
    "axios.put",      # axios
    "axios.delete",   # axios
    "axios.patch",    # axios
    "axios.request",  # axios
    "axios.head",     # axios
    "request",        # request / request-promise (legacy HTTP client)
    "ky",             # ky (callable HTTP client)
    "ky.get",         # ky
    "ky.post",        # ky
    "ky.put",         # ky
    "ky.delete",      # ky
    "ky.patch",       # ky
    "ky.head",        # ky
    "got",            # got (callable HTTP client)
    "got.get",        # got
    "got.post",       # got
    "got.put",        # got
    "got.delete",     # got
    "got.patch",      # got
    "ofetch",         # ofetch (callable HTTP client)
]
# Bare DB verbs match any receiver via the last-segment rule, so local-variable
# receivers (`pool.query`, `db.execute`, `conn.exec`) match without enumerating
# every variable name: node-postgres / mysql2 / sequelize / typeorm (`query`),
# sqlite/knex (`exec`/`raw`/`prepare`), Prisma raw escapes.
sql = [
    "query",              # node-postgres / mysql2 / sequelize / typeorm
    "execute",            # node DB drivers (generic execute)
    "exec",               # sqlite3 / better-sqlite3
    "raw",                # knex / sequelize raw SQL
    "prepare",            # better-sqlite3 / node DB prepared statements
    "$queryraw",          # Prisma raw query
    "$executeraw",        # Prisma raw execute
    "$queryrawunsafe",    # Prisma raw query (unsafe)
    "$executerawunsafe",  # Prisma raw execute (unsafe)
]
route = []
