[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "::",   # module separator
    "=>",   # hash rocket
    "&&",   # logical and
    "||",   # logical or
    "&.",   # safe navigation
    "<<",   # heredoc / append
    "@",    # instance variable
    "@@",   # class variable
    "!",    # bang method
    "?",    # predicate method
]

# Naming conventions to recognize
naming_styles = ["snake_case", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is_",
    "has_",
    "can_",
    "_?",
    "_!",
    "find_",
    "create_",
]

[variants]
strip_prefixes = []
strip_suffixes = ["_controller", "_helper", "_spec", "_test"]

[scoring]
important_patterns = [
    "def ",
    "class ",
    "module ",
    "attr_accessor",
    "attr_reader",
    "private",
]

[embeddings]
extra_kinds = []
variable_ratio = 0.50  # method assignments, attr_accessor

# String-literal call-argument carriers (Miller bridge Phase 3b). Bare entries
# match any receiver via the gate's last-segment rule; dotted entries match the
# exact `Receiver.method` carrier. Each entry cites its source library.
[literal_carriers]
url = [
    "Net::HTTP.get",          # Ruby stdlib net/http
    "Net::HTTP.post",         # Ruby stdlib net/http
    "Net::HTTP.get_response", # Ruby stdlib net/http
    "HTTParty.get",           # httparty gem
    "HTTParty.post",          # httparty gem
    "HTTParty.put",           # httparty gem
    "HTTParty.delete",        # httparty gem
    "HTTParty.patch",         # httparty gem
    "HTTParty.head",          # httparty gem
    "RestClient.get",         # rest-client gem
    "RestClient.post",        # rest-client gem
    "RestClient.put",         # rest-client gem
    "RestClient.delete",      # rest-client gem
    "RestClient.patch",       # rest-client gem
    "RestClient.head",        # rest-client gem
    "Faraday.get",            # faraday gem (module-level convenience)
    "Faraday.post",           # faraday gem (module-level convenience)
    "Faraday.put",            # faraday gem (module-level convenience)
    "Faraday.delete",         # faraday gem (module-level convenience)
    "Faraday.patch",          # faraday gem (module-level convenience)
    "Faraday.head",           # faraday gem (module-level convenience)
]
sql = [
    "execute",      # ActiveRecord connection / generic DB adapter
    "exec_query",   # ActiveRecord connection
    "find_by_sql",  # ActiveRecord model
    "select_all",   # ActiveRecord connection
    "query",        # mysql2 / pg client
]
route = []
