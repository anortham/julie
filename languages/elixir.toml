[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "|>",   # pipe operator
    "<>",   # binary concatenation
    "->",   # arrow (case/fn clauses)
    "<-",   # comprehension generator
    "::",   # type operator
    "~",    # sigil prefix
    "@",    # module attribute
    "&&",   # logical and
    "||",   # logical or
    "!",    # logical not
]

# Naming conventions to recognize
naming_styles = ["snake_case", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is_",
    "has_",
    "can_",
    "do_",
    "handle_",
    "?",    # predicate function
    "!",    # mutation/raise function
]

[variants]
strip_prefixes = ["_"]
strip_suffixes = ["_test", "_impl", "_behaviour", "_behavior"]

[scoring]
important_patterns = [
    "defmodule ",
    "def ",
    "defp ",
    "defmacro ",
    "defprotocol ",
    "defimpl ",
    "defstruct",
    "defdelegate ",
    "use ",
    "behaviour ",
]

[embeddings]
# Default: global EMBEDDABLE_KINDS only, variable_ratio = 0.20
extra_kinds = []

# String-literal call-argument carriers (Miller bridge Phase 3b). Bare entries
# match any receiver via the gate's last-segment rule; dotted entries match the
# exact `Module.function` carrier. Each entry cites its source library.
[literal_carriers]
url = [
    "HTTPoison.get",     # httpoison
    "HTTPoison.post",    # httpoison
    "HTTPoison.put",     # httpoison
    "HTTPoison.delete",  # httpoison
    "HTTPoison.patch",   # httpoison
    "HTTPoison.head",    # httpoison
    "HTTPoison.request", # httpoison
    "Req.get",           # req
    "Req.post",          # req
    "Req.put",           # req
    "Req.delete",        # req
    "Req.patch",         # req
    "Req.head",          # req
    "Req.request",       # req
    "Tesla.get",         # tesla
    "Tesla.post",        # tesla
    "Tesla.put",         # tesla
    "Tesla.delete",      # tesla
    "Tesla.patch",       # tesla
    "Tesla.head",        # tesla
]
sql = [
    "query",    # Ecto Repo.query / Postgrex.query
    "query!",   # Ecto Repo.query!
    "execute",  # Ecto migration execute / SQL adapter
    "prepare",  # Postgrex.prepare
]
route = []
