[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    ".*",   # pointer dereference field
    ".?",   # optional unwrap
    ".@",   # field by string
    "++",   # pointer arithmetic
    "||",   # parallel
    "orelse", # optional else
    "catch", # error handling
]

# Naming conventions to recognize
naming_styles = ["camelCase", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is",
    "has",
    "@",
]

[variants]
strip_prefixes = []
strip_suffixes = []

[scoring]
important_patterns = [
    "pub fn",
    "pub const",
    "const ",
    "struct ",
    "test ",
]

[embeddings]
extra_kinds = []  # 4394 constants, but need filtering before embedding
variable_ratio = 0.30

# Miller bridge Phase 3: string-literal carriers. The extractor captures every
# string call-argument config-free; this gate classifies a literal as url/sql
# only when its carrier (called function / dotted path, lowercased) matches below.
# Carriers match exactly OR by last `.` segment, so `std.Uri.parse(...)` (carrier
# `std.uri.parse`) matches either `std.uri.parse` or a bare `parse`.
[literal_carriers]
# Zig std URL parsing: `std.Uri.parse("https://...")` / `std.Uri.parseAfterScheme`.
url = [
    "std.uri.parse",
    "std.uri.parseafterscheme",
]
# zig-sqlite query API: `db.exec("...")`, `db.prepare("SELECT ...")`.
sql = [
    "exec",
    "prepare",
]
route = []
