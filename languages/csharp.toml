[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "=>",   # lambda / expression body
    "?.",   # null conditional
    "??",   # null coalescing
    "??=",  # null coalescing assignment
    "::",   # global/alias qualifier
    "&&",   # logical and
    "||",   # logical or
    "<>",   # generics
]

# Naming conventions to recognize
naming_styles = ["PascalCase", "camelCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "Is",
    "Has",
    "Can",
    "Get",
    "Set",
    "On",
    "I",
    "_",
    "Async",
]

[variants]
strip_prefixes = ["I", "_"]
strip_suffixes = ["Async", "Handler", "Service", "Controller", "Repository"]

[scoring]
important_patterns = [
    "public class",
    "public interface",
    "public enum",
    "public struct",
    "async Task",
    "[ApiController]",
]

[embeddings]
extra_kinds = ["constructor"]  # DI patterns, 595 in Newtonsoft.Json

[annotation_classes]
entrypoint = [
    "apicontroller",
    "route",
    "httpget",
    "httppost",
    "httpput",
    "httpdelete",
    "httppatch",
]
auth = ["authorize"]
auth_bypass = ["allowanonymous"]

[annotation_classes.test]
test_case = ["fact", "test", "testmethod"]
parameterized_test = ["theory", "testcase", "testcasesource", "datatestmethod"]
fixture_setup = ["setup", "onetimesetup", "testinitialize", "classinitialize", "assemblyinitialize"]
fixture_teardown = ["teardown", "onetimeteardown", "testcleanup", "classcleanup", "assemblycleanup"]
test_container = ["testfixture", "testclass", "collection", "collectiondefinition"]

[test_evidence]
assertion_identifiers = ["equal", "true", "false", "null", "notnull", "throws", "throwsasync", "contains", "empty", "istype", "collection", "single", "istrue", "isfalse", "areequal"]
error_assertion_identifiers = ["throws", "throwsasync", "catch"]
mock_identifiers = ["mock", "setup", "returns", "verifiable"]

[early_warnings]
review_markers = ["allowanonymous"]
schema_version = 1
