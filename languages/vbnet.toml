[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "<>",   # not-equal / generics use (Of ...)
    ">=",   # greater-or-equal
    "<=",   # less-or-equal
    ":=",   # named argument
    "&=",   # string concat-assign
    "+=",   # add-assign
    "-=",   # subtract-assign
    "&",    # string concatenation
]

# Naming conventions to recognize (VB.NET is case-insensitive but PascalCase
# is conventional for public members, camelCase for locals).
naming_styles = ["PascalCase", "camelCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "Is",
    "Has",
    "Can",
    "Get",
    "Set",
    "On",
    "I",
    "_",
    "Async",
]

[variants]
strip_prefixes = ["I", "_"]
strip_suffixes = ["Async", "Handler", "Service", "Controller", "Repository"]

[scoring]
important_patterns = [
    "Public Class",
    "Public Interface",
    "Public Module",
    "Public Function",
    "Public Sub",
    "<ApiController>",
]

[embeddings]
extra_kinds = ["constructor"]  # DI patterns mirror C#

[annotation_classes]
entrypoint = [
    "apicontroller",
    "route",
    "httpget",
    "httppost",
    "httpput",
    "httpdelete",
    "httppatch",
]
auth = ["authorize"]
auth_bypass = ["allowanonymous"]

[annotation_classes.test]
test_case = ["fact", "test", "testmethod"]
parameterized_test = ["theory", "testcase", "testcasesource", "datatestmethod"]
fixture_setup = ["setup", "onetimesetup", "testinitialize", "classinitialize", "assemblyinitialize"]
fixture_teardown = ["teardown", "onetimeteardown", "testcleanup", "classcleanup", "assemblycleanup"]
test_container = ["testfixture", "testclass", "collection", "collectiondefinition"]

[test_evidence]
assertion_identifiers = ["equal", "true", "false", "null", "notnull", "throws", "throwsasync", "contains", "empty", "istype", "collection", "single", "istrue", "isfalse", "areequal"]
error_assertion_identifiers = ["throws", "throwsasync", "catch"]
mock_identifiers = ["mock", "setup", "returns", "verifiable"]

[early_warnings]
review_markers = ["allowanonymous"]
schema_version = 1

# String-literal call-arg carriers (Miller bridge Phase 3). VB.NET runs on .NET,
# so the carrier is the invoked method name with generics stripped (receiver
# dropped) — Dapper `conn.Query(Of T)(...)` matches `query`, HttpClient
# `client.GetAsync(...)` matches `getasync`. Mirrors csharp.toml.
# Case-insensitive (lowercased at load).
[literal_carriers]
url = [
    "getasync",            # System.Net.Http.HttpClient
    "getstringasync",      # HttpClient
    "getbytearrayasync",   # HttpClient
    "getstreamasync",      # HttpClient
    "postasync",           # HttpClient
    "putasync",            # HttpClient
    "deleteasync",         # HttpClient
    "patchasync",          # HttpClient
    "sendasync",           # HttpClient
]
sql = [
    "query",                       # Dapper
    "queryasync",                  # Dapper
    "queryfirst",                  # Dapper
    "queryfirstasync",             # Dapper
    "queryfirstordefault",         # Dapper
    "queryfirstordefaultasync",    # Dapper
    "querysingle",                 # Dapper
    "querysingleasync",            # Dapper
    "querysingleordefault",        # Dapper
    "querysingleordefaultasync",   # Dapper
    "querymultiple",               # Dapper
    "querymultipleasync",          # Dapper
    "execute",                     # Dapper / ADO.NET
    "executeasync",                # Dapper
    "executescalar",               # ADO.NET (DbCommand)
    "executescalarasync",          # ADO.NET
    "executereader",               # ADO.NET (DbCommand)
    "executereaderasync",          # ADO.NET
    "fromsqlraw",                  # EF Core
    "fromsqlinterpolated",         # EF Core
    "executesqlraw",               # EF Core
    "executesqlrawasync",          # EF Core
    "executesqlinterpolated",      # EF Core
    "executesqlinterpolatedasync", # EF Core
]
route = []
