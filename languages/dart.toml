[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "=>",   # arrow function
    "?.",   # null-aware access
    "??",   # null-aware operator
    "??=",  # null-aware assignment
    "?..",  # null-aware cascade
    "..",   # cascade
    "<>",   # generics
    "@",    # annotation
]

# Naming conventions to recognize
naming_styles = ["camelCase", "PascalCase", "snake_case"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is",
    "has",
    "get",
    "set",
    "_",
]

[variants]
strip_prefixes = ["_"]
strip_suffixes = ["Widget", "State", "Bloc", "Cubit", "Provider"]

[scoring]
important_patterns = [
    "class ",
    "mixin ",
    "extension ",
    "abstract class",
    "@override",
    "Widget build",
]

[embeddings]
extra_kinds = ["constructor"]  # 473 in Riverpod; named constructors are important

# String-literal carrier vocabulary (Miller bridge Phase 3b). Keys are lowercased
# at build time and matched case-insensitively; dotted entries match exactly,
# bare entries match any receiver via the gate's last-segment rule.
[literal_carriers]
# package:http and Dio take the URL string. Dotted for generic verbs
# (`http.get`/`dio.get`) so a bare `.get`/`.post` on arbitrary receivers does
# not flood.
url = [
    "http.get",     # package:http
    "http.post",
    "http.put",
    "http.delete",
    "http.head",
    "dio.get",      # Dio
    "dio.post",
    "dio.put",
    "dio.delete",
]
# sqflite query/exec verbs are called on a Database receiver whose variable name
# varies (db) — bare entries match any receiver via last-segment. `rawQuery`,
# `rawInsert`, `rawUpdate`, `rawDelete`, `execute` are distinctive enough.
sql = [
    "rawquery",     # sqflite
    "rawinsert",
    "rawupdate",
    "rawdelete",
    "execute",
]
route = []

# Test-role annotation vocabulary (Miller bridge test-roles). Keys are the
# normalized annotation_key form (lowercased, `@` stripped). Dart's primary test
# style is call-based (`test()`/`group()` from package:test — materialized as
# symbols by the extractor's call_expression arm). Annotations are secondary:
# `@isTest` (package:meta) marks a function as a test; `@test` is used by some
# frameworks. Both classify the annotated function as a test case regardless of
# name or path.
[annotation_classes.test]
test_case = ["test", "istest"]
