[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "::",   # method reference
    "->",   # lambda arrow
    "<>",   # diamond operator
    "@",    # annotation
    "&&",   # logical and
    "||",   # logical or
]

# Naming conventions to recognize
naming_styles = ["camelCase", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is",
    "has",
    "get",
    "set",
    "create",
    "build",
    "Abstract",
    "Base",
    "I",
    "Impl",
]

[variants]
strip_prefixes = ["Abstract", "Base", "I"]
strip_suffixes = ["Impl", "Factory", "Builder", "Service", "Repository"]

[scoring]
important_patterns = [
    "public class",
    "public interface",
    "public enum",
    "public void",
    "public static",
    "@Override",
]

[embeddings]
extra_kinds = ["constructor"]  # 3696 in Guava; DI injection, factory patterns

[annotation_classes]
entrypoint = [
    "restcontroller",
    "controller",
    "requestmapping",
    "getmapping",
    "postmapping",
    "putmapping",
    "deletemapping",
    "patchmapping",
    "path",
]
auth = [
    "preauthorize",
    "postauthorize",
    "secured",
    "rolesallowed",
    "authenticated",
]
auth_bypass = ["permitall"]
scheduler = ["scheduled"]

[annotation_classes.test]
test_case = ["test", "repeatedtest", "testfactory", "testtemplate"]
parameterized_test = ["parameterizedtest"]
fixture_setup = ["beforeeach", "beforeall", "before", "beforeclass", "beforemethod", "beforesuite"]
fixture_teardown = ["aftereach", "afterall", "after", "afterclass", "aftermethod", "aftersuite"]
test_container = ["nested"]
# JUnit 3 / TestNG legacy: a class extending TestCase is a test container with no
# annotation. Matched by last path segment in classify_test_role against the
# extractor's `base_types` metadata. Covers `junit.framework.TestCase` too.
test_base_types = ["TestCase"]

[test_evidence]
assertion_identifiers = ["assertequals", "asserttrue", "assertfalse", "assertnull", "assertnotnull", "assertthrows", "assertthat"]
error_assertion_identifiers = ["assertthrows"]
mock_identifiers = ["mock", "spy", "when", "verify"]

[early_warnings]
review_markers = ["permitall"]
schema_version = 1

# String-literal call-argument carriers (Miller bridge Phase 3b). Bare entries
# match any receiver via the gate's last-segment rule (`st.execute` → `execute`);
# dotted entries match an exact `Receiver.method` carrier. Each entry cites its
# source library. (HttpClient.send/sendAsync take an HttpRequest, not a URL
# string, so the URL literal rides on URI.create / RestTemplate / OkHttp .url.)
[literal_carriers]
url = [
    "getForObject",   # Spring RestTemplate
    "getForEntity",   # Spring RestTemplate
    "postForObject",  # Spring RestTemplate
    "postForEntity",  # Spring RestTemplate
    "patchForObject", # Spring RestTemplate
    "exchange",       # Spring RestTemplate
    "url",            # OkHttp Request.Builder.url
    "URI.create",     # java.net.URI (dotted)
]
sql = [
    "execute",           # java.sql.Statement
    "executeQuery",      # java.sql.Statement
    "executeUpdate",     # java.sql.Statement
    "executeLargeUpdate",# java.sql.Statement
    "prepareStatement",  # java.sql.Connection
    "prepareCall",       # java.sql.Connection
    "query",             # Spring JdbcTemplate
    "queryForObject",    # Spring JdbcTemplate
    "queryForList",      # Spring JdbcTemplate
    "queryForMap",       # Spring JdbcTemplate
    "update",            # Spring JdbcTemplate
    "batchUpdate",       # Spring JdbcTemplate
]
route = []
