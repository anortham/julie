[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "::",   # label (rarely used)
    "...",  # vararg
    "..",   # concatenation
    "and",  # logical and (keyword)
    "or",   # logical or (keyword)
]

# Naming conventions to recognize
naming_styles = ["snake_case", "PascalCase", "camelCase"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is_",
    "has_",
    "get_",
    "set_",
    "_",
    "M.",
]

[variants]
strip_prefixes = ["_", "M."]
strip_suffixes = []

[scoring]
important_patterns = [
    "function ",
    "local function",
    "return {",
]

[embeddings]
extra_kinds = []
variable_ratio = 0.50  # table-based function assignments

# String-literal call-argument carriers (Miller bridge Phase 3b). Bare entries
# match any receiver via the gate's last-segment rule (`conn:execute` →
# `execute`); dotted entries match an exact `receiver.method` carrier. Each entry
# cites its source library.
[literal_carriers]
url = [
    "http.request",   # luasocket (socket.http)
    "https.request",  # luasec (ssl.https)
    "requests.get",   # lua-requests
    "requests.post",  # lua-requests
    "requests.put",   # lua-requests
    "requests.delete",# lua-requests
    "requests.patch", # lua-requests
    "requests.head",  # lua-requests
]
sql = [
    "execute",  # LuaSQL (conn:execute)
    "exec",     # lsqlite3 (db:exec)
    "prepare",  # LuaSQL / lsqlite3 (db:prepare)
]
route = []
