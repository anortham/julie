[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "::",   # scope resolution
    "->",   # pointer member access
    "=>",   # trailing return type
    "<>",   # template
    "<<",   # left shift / stream insertion
    ">>",   # right shift / stream extraction
    "&&",   # rvalue reference / logical and
    "||",   # logical or
    "...",  # variadic
]

# Naming conventions to recognize
naming_styles = ["snake_case", "PascalCase", "camelCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "m_",
    "s_",
    "g_",
    "_impl",
    "_ptr",
    "I",
    "C",
]

[variants]
strip_prefixes = ["m_", "s_", "g_", "C", "I"]
strip_suffixes = ["_impl", "_ptr", "_t"]

[scoring]
important_patterns = [
    "class ",
    "struct ",
    "namespace",
    "template",
    "virtual",
    "override",
    "public:",
]

[embeddings]
extra_kinds = ["constructor"]
variable_ratio = 0.40  # 39% variables in nlohmann-json

# Miller bridge Phase 3: string-literal carriers. The extractor captures every
# string call-argument config-free; this gate classifies a literal as url/sql
# only when its carrier (called function, lowercased) matches below. Carriers are
# matched exactly OR by last `.` segment, so `db.exec(...)` (carrier `db.exec`)
# matches a bare `exec` config.
[literal_carriers]
# libcurl C API is usable from C++; same over-capture caveat as c.toml.
url = [
    "curl_easy_setopt",
]
# C SQLite/libpq/MySQL APIs plus SQLiteCpp's `db.exec(...)` / `db.execAndGet(...)`
# and the common method-style `query(...)`/`prepare(...)` wrappers (matched by the
# gate's last-segment rule).
sql = [
    "sqlite3_exec",
    "sqlite3_prepare",
    "sqlite3_prepare_v2",
    "sqlite3_prepare_v3",
    "pqexec",
    "pqprepare",
    "pqexecparams",
    "mysql_query",
    "mysql_real_query",
    "exec",
    "execandget",
    "query",
    "prepare",
]
route = []

# Test-role classification (Miller bridge test detection).
# C++ has no native test attributes, so the cpp extractor SYNTHESIZES annotation
# markers for GoogleTest macros and records base types for fixtures:
#   - GoogleTest TEST/TEST_F/TEST_P/TYPED_TEST/TYPED_TEST_P macros parse as
#     function_definition nodes. The extractor (functions.rs) names them
#     `Suite.Name`, sets is_test=true STRUCTURALLY (a graceful fallback), AND
#     attaches a synthetic annotation whose key is the lowercased macro keyword. The
#     mapping below turns that annotation into a ROLE — the value/pattern-
#     parameterized `_P` variants are `parameterized_test`, the rest are plain
#     `test_case`. The annotation path is what keeps the `_P` role distinction
#     (structural is_test alone would collapse all five to test_case). No detect_cpp
#     arm — the annotation path drives the role.
#   - GoogleTest fixtures subclass `::testing::Test` / `::testing::TestWithParam<T>`.
#     The extractor records clean `base_types` on the class, and this
#     `test_base_types` entry flags those fixture classes as test containers
#     (matched by last `.`/`:` segment, so `::testing::Test` matches `testing::Test`).
#   - Catch2 `TEST_CASE("...")` is a call_expression statement (no symbol), handled
#     call-style in test_calls.rs, not here.
[annotation_classes.test]
test_case = ["test", "test_f", "typed_test"]
parameterized_test = ["test_p", "typed_test_p"]
fixture_setup = []
fixture_teardown = []
test_container = []
test_base_types = ["testing::Test", "testing::TestWithParam"]
