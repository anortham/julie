[tokenizer]
preserve_patterns = [
    "__",   # dunder methods/attributes
    "@",    # decorator
    "**",   # kwargs / power
    "->",   # return type hint
]

naming_styles = ["snake_case", "PascalCase", "SCREAMING_SNAKE_CASE"]

meaningful_affixes = [
    "_",      # private prefix
    "__",     # name mangling prefix
    "is_",
    "has_",
    "get_",
    "set_",
    "_async",
]

[variants]
strip_prefixes = ["_", "__"]
strip_suffixes = ["_impl", "_mixin", "_base"]

[scoring]
important_patterns = [
    "def ",
    "class ",
    "async def",
    "@property",
    "@classmethod",
    "@staticmethod",
]

[embeddings]
extra_kinds = []
variable_ratio = 0.40  # decorated assignments, module-level vars

[annotation_classes]
entrypoint = [
    "app.route",
    "app.get",
    "app.post",
    "app.put",
    "app.delete",
    "app.patch",
    "router.get",
    "router.post",
    "router.put",
    "router.delete",
    "router.patch",
    "blueprint.route",
]
auth = [
    "login_required",
    "permission_required",
    "user_passes_test",
    "jwt_required",
    "requires_auth",
    "auth_required",
    "require_auth",
]
auth_bypass = ["allow_anonymous"]
scheduler = ["celery.task", "shared_task", "periodic_task"]

[annotation_classes.test]
test_case = []
parameterized_test = ["pytest.mark.parametrize"]
fixture_setup = ["pytest.fixture"]
fixture_teardown = []
test_container = []

[early_warnings]
review_markers = ["allow_anonymous"]
schema_version = 1
