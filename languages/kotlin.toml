[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "::",   # member reference
    "->",   # lambda arrow
    "?.",   # safe call
    "?:",   # elvis operator
    "!!",   # not-null assertion
    "<>",   # generics
    "@",    # annotation
]

# Naming conventions to recognize
naming_styles = ["camelCase", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is",
    "has",
    "get",
    "set",
    "on",
    "_",
]

[variants]
strip_prefixes = ["_"]
strip_suffixes = ["Impl", "Kt", "Activity", "Fragment", "ViewModel"]

[scoring]
important_patterns = [
    "fun ",
    "class ",
    "data class",
    "object ",
    "interface ",
    "suspend fun",
]

[embeddings]
extra_kinds = ["constructor"]

[annotation_classes]
entrypoint = [
    "restcontroller",
    "controller",
    "requestmapping",
    "getmapping",
    "postmapping",
    "putmapping",
    "deletemapping",
    "patchmapping",
    "path",
]
auth = [
    "preauthorize",
    "postauthorize",
    "secured",
    "rolesallowed",
    "authenticated",
]
auth_bypass = ["permitall"]
scheduler = ["scheduled"]
test = ["test", "parameterizedtest"]
fixture = ["beforeeach", "beforeall"]

[early_warnings]
review_markers = ["permitall"]
schema_version = 1
