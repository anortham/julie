[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "::",   # member reference
    "->",   # lambda arrow
    "?.",   # safe call
    "?:",   # elvis operator
    "!!",   # not-null assertion
    "<>",   # generics
    "@",    # annotation
]

# Naming conventions to recognize
naming_styles = ["camelCase", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is",
    "has",
    "get",
    "set",
    "on",
    "_",
]

[variants]
strip_prefixes = ["_"]
strip_suffixes = ["Impl", "Kt", "Activity", "Fragment", "ViewModel"]

[scoring]
important_patterns = [
    "fun ",
    "class ",
    "data class",
    "object ",
    "interface ",
    "suspend fun",
]

[embeddings]
extra_kinds = ["constructor"]

[annotation_classes]
entrypoint = [
    "restcontroller",
    "controller",
    "requestmapping",
    "getmapping",
    "postmapping",
    "putmapping",
    "deletemapping",
    "patchmapping",
    "path",
]
auth = [
    "preauthorize",
    "postauthorize",
    "secured",
    "rolesallowed",
    "authenticated",
]
auth_bypass = ["permitall"]
scheduler = ["scheduled"]

[annotation_classes.test]
test_case = ["test", "repeatedtest", "testfactory", "testtemplate"]
parameterized_test = ["parameterizedtest"]
fixture_setup = ["beforeeach", "beforeall", "before", "beforeclass", "beforemethod", "beforesuite", "beforetest"]
fixture_teardown = ["aftereach", "afterall", "after", "afterclass", "aftermethod", "aftersuite", "aftertest"]
test_container = ["nested"]

[early_warnings]
review_markers = ["permitall"]
schema_version = 1
