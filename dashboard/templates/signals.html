{% extends "base.html" %}
{% block title %}Signals - Julie Dashboard{% endblock %}
{% block content %}

<div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;">
  <h1 class="title" style="margin-bottom: 0;">Signals</h1>
  <span class="mono" style="color: var(--julie-text-muted); font-size: 0.85rem;">{{ workspace_id }}</span>
</div>

<div id="signals-summary"
     hx-get="/signals/{{ workspace_id }}/summary"
     hx-trigger="load"
     hx-swap="innerHTML">
  <div class="julie-card">
    <p style="color: var(--julie-text-muted); font-size: 0.85rem;">Loading signals...</p>
  </div>
</div>

{% endblock %}
