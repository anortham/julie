<div class="julie-card">
  <p class="label-text" style="margin-bottom: 0.75rem;">Services</p>
  <table class="table is-fullwidth" style="background: transparent;">
    <thead>
      <tr>
        <th style="background: transparent;">Service</th>
        <th style="background: transparent;">Status</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Search Engine (Tantivy)</td>
        <td><span class="status-dot is-healthy"></span> Running</td>
      </tr>
      <tr>
        <td>Embedding Service</td>
        <td id="embedding-status">
          {% if embedding_available %}
            <span class="status-dot is-healthy"></span> Available
          {% elif embedding_initializing %}
            <span class="status-dot is-warning"></span>
            <span style="color: var(--julie-warning);">Initializing</span>
          {% else %}
            <span class="status-dot is-muted"></span>
            <span style="color: var(--julie-text-muted);">Not configured</span>
          {% endif %}
        </td>
      </tr>
      <tr>
        <td>Binary Status</td>
        <td>
          {% if restart_pending %}
            <span class="status-dot is-warning"></span>
            <span style="color: var(--julie-warning);">Restart Pending</span>
          {% else %}
            <span class="status-dot is-healthy"></span> Current
          {% endif %}
        </td>
      </tr>
    </tbody>
  </table>
</div>
