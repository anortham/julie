{% extends "base.html" %}
{% block title %}Projects - Julie Dashboard{% endblock %}
{% block content %}

<h1 class="title" style="margin-bottom: 1rem;">Projects</h1>

<div id="project-summary" style="margin-bottom: 1.5rem; color: var(--julie-text-muted); font-size: 0.9rem;">
  {% include "partials/project_summary.html" %}
</div>

{% include "partials/project_table.html" %}

<script>
// Poll workspace statuses every 5s and update badges + stats in place.
// This avoids replacing the table DOM, which would reset Alpine expand state.
setInterval(async () => {
  try {
    const resp = await fetch('/projects/statuses');
    if (!resp.ok) return;
    const data = await resp.json();

    // Update summary bar
    const summary = document.getElementById('project-summary');
    if (summary && data._summary) summary.innerHTML = data._summary;

    // Update each workspace row
    for (const [id, ws] of Object.entries(data)) {
      if (id === '_summary') continue;
      const badge = document.getElementById('status-' + id);
      if (badge) badge.innerHTML = ws.badge;
      const sym = document.getElementById('symbols-' + id);
      if (sym) sym.textContent = ws.symbols;
      const files = document.getElementById('files-' + id);
      if (files) files.textContent = ws.files;
      const vecs = document.getElementById('vectors-' + id);
      if (vecs) vecs.textContent = ws.vectors;
    }
  } catch (_) {}
}, 5000);
</script>

{% endblock %}
