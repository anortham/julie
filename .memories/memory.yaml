decisions:
  - '2026-03-31 | Standardized the embedding pipeline on the Python sidecar alone, removing ORT and fastembed to eliminate dual-pipeline complexity.'
  - '2026-04-03 | Core value is intelligence per token, so features are judged by how much understanding they add per token spent.'
  - '2026-04-03 | Dead code metrics were narrowed to functions and methods only, with fixture, example, and docs paths excluded because types were too noisy.'
  - '2026-04-03 | Embedding enrichment uses behavioral metadata plus query classification for dynamic weighting, while CodeRankEmbed and sqlite-vec stay in place.'
  - '2026-04-04 | edit_file and edit_symbol were added as token-saving edit tools with phased rollout, not one all-purpose edit tool.'
  - '2026-04-05 | Bracket validation moved from hard reject to advisory warning because the heuristic had known false positives.'
  - '2026-04-05 | Edit tool enforcement uses three layers, SessionStart guidance, a lean PreToolUse nudge, and a rewritten editing skill, instead of a Read hook or hard block.'
  - '2026-04-08 | Subagent Julie tool awareness is handled in the Julie plugin with hooks, not by keeping a separate workflow plugin fork.'
  - '2026-04-08 | Daemon lifecycle uses an explicit daemon.state file with starting, ready, and stopping phases, and readiness checks hold the daemon lock through confirmation.'
  - '2026-04-09 | Daemon cold-start failures are handled by lazy EmbeddingService init plus a watch state machine so first MCP connects stop timing out.'

open_questions:
  - '2026-03-31 | Sidecar venv CUDA torch swap is fragile if bootstrap recreates the venv, so a fresh-machine test is still needed.'
  - '2026-04-03 | NL query vocabulary still misses synonym gaps, so query expansion or a dual-model approach may be needed.'

deferred_work:
  - '2026-04-04 | The DMP fuzzy path still has a length-mismatch splice bug when the match length differs from old_text.'
  - '2026-04-05 | edit_symbol stays line-granular, so same-line symbols do not get byte or column precise edits.'

gotchas:
  - '2026-03-31 | SidecarLaunchConfig.env was empty, so CUDA support had to pass JULIE_EMBEDDING_DEVICE_PREFERENCE into the sidecar.'
  - '2026-04-03 | sqlite-vec vec0 defaults to L2 distance, so cosine must be set explicitly when storing embedding vectors.'
  - '2026-04-03 | deep_dive similar symbols need reserved token budget, or they get truncated off the end of the response.'
  - '2026-04-03 | search_target=definitions is required for conceptual queries to benefit from semantic search.'
  - '2026-04-03 | Four extractor gaps kept showing up in practice: C++ header-only templates, Lua metatables, HTML and CSS structural links, and JS CommonJS resolution.'
  - '2026-04-04 | DMP bitap has a 32 character pattern limit, so exact substring matching has to run before fuzzy fallback.'
  - '2026-04-04 | Nested hidden .gitignore files can leak a bare * pattern globally when they are flattened into one root GitignoreBuilder.'
  - '2026-04-04 | update_file_hash has to run after a successful edit, or the freshness guard blocks back to back edits on the same file.'
  - '2026-04-05 | Watcher dedup requeue must break out of the inner loop, or it hot spins instead of sleeping.'
  - '2026-04-05 | forward_bytes must not use tokio::select! in a way that cancels daemon to stdout draining when stdin ends.'
