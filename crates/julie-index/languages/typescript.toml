[tokenizer]
preserve_patterns = [
    "?.",   # optional chaining
    "??",   # nullish coalescing
    "=>",   # arrow function
    "<>",   # generics
    "...",  # spread operator
    "?.(",  # optional call
]

naming_styles = ["camelCase", "PascalCase", "SCREAMING_SNAKE_CASE"]

meaningful_affixes = [
    "get",
    "set",
    "is",
    "has",
    "can",
    "should",
    "on",
    "handle",
    "Async",
]

[variants]
strip_prefixes = ["I", "T", "E"]  # Interface, Type, Enum prefixes
strip_suffixes = ["Dto", "Model", "Service", "Controller", "Handler"]

[scoring]
important_patterns = [
    "export function",
    "export class",
    "export interface",
    "export type",
    "export const",
    "async function",
]

[embeddings]
extra_kinds = ["constructor", "export"]  # 1713 exports in Zod
variable_ratio = 0.50  # 50% of symbols are arrow function variables

[annotation_classes]
entrypoint = [
    "controller",
    "get",
    "post",
    "put",
    "delete",
    "patch",
]
auth = ["useguards"]

[early_warnings]
schema_version = 1

# String-literal call-arg carriers (Miller bridge Phase 3). The carrier is the
# callee text: a bare name (`fetch`) or `object.property` for well-known globals
# (`axios.get`). Local-receiver DB carriers (`pool.query`) need the breadth-phase
# matching strategy and are intentionally not listed here yet (reference leg = URL).
# TypeScript and JavaScript share one npm ecosystem — a `.ts` file imports the
# same HTTP clients as a `.js` file — so the url carriers are kept at parity with
# javascript.toml (and vue.toml). When you add an HTTP client to one, add it to
# all three; the breadth guard test asserts TS ⊇ JS for url carriers.
[literal_carriers]
url = [
    "fetch",          # WHATWG Fetch (browser / Node 18+ global)
    "$fetch",         # ofetch (Nuxt global alias)
    "axios",          # axios (callable instance)
    "axios.get",      # axios
    "axios.post",     # axios
    "axios.put",      # axios
    "axios.delete",   # axios
    "axios.patch",    # axios
    "axios.request",  # axios
    "axios.head",     # axios
    "request",        # request / request-promise (legacy HTTP client)
    "ky",             # ky (callable HTTP client)
    "ky.get",         # ky
    "ky.post",        # ky
    "ky.put",         # ky
    "ky.delete",      # ky
    "ky.patch",       # ky
    "ky.head",        # ky
    "got",            # got (callable HTTP client)
    "got.get",        # got
    "got.post",       # got
    "got.put",        # got
    "got.delete",     # got
    "got.patch",      # got
    "ofetch",         # ofetch (callable HTTP client)
]
# Bare method names match any receiver via the gate's last-segment rule, so
# local-variable DB receivers (`pool.query`, `db.execute`, `conn.exec`) are
# captured without enumerating every variable name. Covers node-postgres /
# mysql2 / sequelize / typeorm (`query`), sqlite/knex (`exec`/`raw`/`prepare`),
# and Prisma raw escapes (`$queryRawUnsafe`/`$executeRawUnsafe`).
sql = [
    "query",
    "execute",
    "exec",
    "raw",
    "prepare",
    "$queryraw",
    "$executeraw",
    "$queryrawunsafe",
    "$executerawunsafe",
]
route = []
