[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "->",   # return type
    "?.",   # optional chaining
    "??",   # nil coalescing
    "<>",   # generics
    "&&",   # logical and
    "||",   # logical or
    "@",    # attribute
    "#",    # compiler directive
]

# Naming conventions to recognize
naming_styles = ["camelCase", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is",
    "has",
    "can",
    "should",
    "will",
    "did",
]

[variants]
strip_prefixes = []
strip_suffixes = ["Protocol", "Delegate", "DataSource", "ViewController"]

[scoring]
important_patterns = [
    "func ",
    "class ",
    "struct ",
    "protocol ",
    "extension ",
    "@objc",
    "public",
]

[embeddings]
extra_kinds = ["constructor"]  # 129 in Alamofire; init methods

# String-literal carrier vocabulary (Miller bridge Phase 3b). Keys are lowercased
# at build time and matched case-insensitively; dotted entries match exactly,
# bare entries match any receiver via the gate's last-segment rule.
[literal_carriers]
# Foundation's URL(string:) initializer is the canonical place a URL string
# literal appears. Alamofire's AF.request takes the URL string directly (dotted
# so a generic `.request` on arbitrary receivers does not flood).
url = [
    "url",          # Foundation URL(string:)
    "af.request",   # Alamofire AF.request
]
# SQLite.swift / GRDB SQL verbs are called on a Connection/Database receiver
# whose variable name varies (db, conn) — bare entries match any receiver via
# last-segment. Verbs are distinctive enough not to flood.
sql = [
    "prepare",      # SQLite.swift / GRDB
    "run",          # SQLite.swift
    "execute",      # SQLite.swift / GRDB
    "scalar",       # SQLite.swift
]
route = []

# Test-role annotation vocabulary (Miller bridge test-roles). Keys are the
# normalized annotation_key form (lowercased, `@` stripped). Swift has two
# frameworks: XCTest (XCTestCase subclasses + test* methods — the base-type rule
# below + naming detection in test_detection.rs) and the newer Swift Testing
# (`@Test` / `@Suite` macros, path-independent).
[annotation_classes.test]
test_case = ["test"]          # Swift Testing @Test
test_container = ["suite"]    # Swift Testing @Suite (on a struct/class)
# XCTest: a class extending XCTestCase is a test container even with no
# annotation. Matched by last path segment in classify_test_role, so the
# extractor's `base_types` metadata (["XCTestCase"]) lights it up.
test_base_types = ["XCTestCase"]
