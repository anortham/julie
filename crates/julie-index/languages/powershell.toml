[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "$_",   # pipeline variable
    "$?",   # last command status
    "$^",   # first token
    "$$",   # last token
    "|",    # pipe
    "||",   # or
    "&&",   # and
    "-eq",  # equals
    "-ne",  # not equals
    "-gt",  # greater than
    "-lt",  # less than
    "::",   # static member
]

# Naming conventions to recognize
naming_styles = ["PascalCase", "camelCase"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "Get-",
    "Set-",
    "New-",
    "Remove-",
    "Test-",
    "Invoke-",
]

[variants]
strip_prefixes = ["Get-", "Set-", "New-", "Remove-", "Test-", "Invoke-"]
strip_suffixes = [".ps1", ".psm1"]

[scoring]
important_patterns = [
    "function ",
    "param(",
    "Begin {",
    "Process {",
    "End {",
]

[embeddings]
# Default: global EMBEDDABLE_KINDS only, variable_ratio = 0.20
extra_kinds = []

# String-literal carrier vocabulary (Miller bridge Phase 3b). PowerShell is a
# COMMAND grammar, so the carrier is the cmdlet NAME, not a method on a receiver.
# Keys are lowercased at build time and matched case-insensitively. Cmdlet names
# carry no `.`, so the gate's last-segment rule never fires here — every entry is
# an exact lowercase cmdlet-name match. The quoted value after `-Uri`/`-Query`
# (or a positional first arg) is the captured string literal.
[literal_carriers]
# Web cmdlets whose -Uri (or positional) arg is the URL, plus the canonical
# `irm`/`iwr` aliases.
url = [
    "invoke-restmethod",
    "invoke-webrequest",
    "irm",
    "iwr",
]
# Invoke-Sqlcmd takes the query via -Query (or positional). `invoke-sqlcmd2` is
# the popular community module variant.
sql = [
    "invoke-sqlcmd",
    "invoke-sqlcmd2",
]
route = []
