[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    ":=",   # type inference
    "->",   # return type hint
    "&&",   # and
    "||",   # or
    "@",    # annotation
    "$",    # node path shorthand
    "%",    # unique node shorthand
]

# Naming conventions to recognize
naming_styles = ["snake_case", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is_",
    "has_",
    "can_",
    "_",
    "on_",
]

[variants]
strip_prefixes = ["_"]
strip_suffixes = [".gd"]

[scoring]
important_patterns = [
    "func ",
    "class_name",
    "extends ",
    "signal ",
    "@export",
    "@onready",
]

[embeddings]
extra_kinds = ["constructor", "export"]
variable_ratio = 0.40

# String-literal call-argument carriers (Miller bridge Phase 3b). Bare entries
# match any receiver via the gate's last-segment rule (`http.request` → `request`);
# dotted entries match an exact `receiver.method` carrier. Each entry cites its
# source library.
[literal_carriers]
url = [
    "request",      # HTTPRequest.request (Godot built-in node)
    "request_raw",  # HTTPRequest.request_raw (Godot built-in node)
]
sql = [
    "query",                # godot-sqlite plugin (SQLite.query)
    "query_with_bindings",  # godot-sqlite plugin (SQLite.query_with_bindings)
]
route = []

# Test-role classification (Miller bridge test detection).
# GUT (Godot Unit Test) scripts are a top-level `extends GutTest` with `func test_*`
# methods. The gdscript extractor synthesizes an implicit file-class and emits
# `base_types = ["GutTest"]` on it; this `test_base_types` entry flags that class as
# a test container (matched by last segment, so subclasses like `GutTest` qualify).
# The `func test_*` methods are flagged name-based in test_detection.rs (detect_gdscript).
[annotation_classes.test]
test_case = []
parameterized_test = []
fixture_setup = []
fixture_teardown = []
test_container = []
test_base_types = ["GutTest"]
