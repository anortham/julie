[tokenizer]
# Character sequences to preserve as single tokens
preserve_patterns = [
    "::",   # member reference
    "->",   # lambda arrow
    "?.",   # safe call
    "?:",   # elvis operator
    "!!",   # not-null assertion
    "<>",   # generics
    "@",    # annotation
]

# Naming conventions to recognize
naming_styles = ["camelCase", "PascalCase", "SCREAMING_SNAKE_CASE"]

# Prefixes/suffixes with semantic meaning
meaningful_affixes = [
    "is",
    "has",
    "get",
    "set",
    "on",
    "_",
]

[variants]
strip_prefixes = ["_"]
strip_suffixes = ["Impl", "Kt", "Activity", "Fragment", "ViewModel"]

[scoring]
important_patterns = [
    "fun ",
    "class ",
    "data class",
    "object ",
    "interface ",
    "suspend fun",
]

[embeddings]
extra_kinds = ["constructor"]

[annotation_classes]
entrypoint = [
    "restcontroller",
    "controller",
    "requestmapping",
    "getmapping",
    "postmapping",
    "putmapping",
    "deletemapping",
    "patchmapping",
    "path",
]
auth = [
    "preauthorize",
    "postauthorize",
    "secured",
    "rolesallowed",
    "authenticated",
]
auth_bypass = ["permitall"]
scheduler = ["scheduled"]

[annotation_classes.test]
test_case = ["test", "repeatedtest", "testfactory", "testtemplate"]
parameterized_test = ["parameterizedtest"]
fixture_setup = ["beforeeach", "beforeall", "before", "beforeclass", "beforemethod", "beforesuite", "beforetest"]
fixture_teardown = ["aftereach", "afterall", "after", "afterclass", "aftermethod", "aftersuite", "aftertest"]
test_container = ["nested"]

[test_evidence]
assertion_identifiers = ["assertequals", "asserttrue", "assertfalse", "assertnull", "assertnotnull", "assertthrows", "assertthat"]
error_assertion_identifiers = ["assertthrows"]
mock_identifiers = ["mock", "every", "verify", "coevery"]

[early_warnings]
review_markers = ["permitall"]
schema_version = 1

# String-literal carrier vocabulary (Miller bridge Phase 3b). Keys are lowercased
# at build time and matched case-insensitively; dotted entries match exactly,
# bare entries match any receiver via the gate's last-segment rule.
[literal_carriers]
# Ktor client get/post and OkHttp Request.Builder.url take the URL string.
# Dotted for generic verbs (`client.get`) so they don't flood on arbitrary
# receivers; `url` is the OkHttp builder setter (distinctive enough as bare).
url = [
    "client.get",       # Ktor HttpClient.get
    "client.post",
    "client.put",
    "client.delete",
    "url",              # OkHttp Request.Builder().url(...)
]
# JDBC + Exposed SQL verbs are called on Statement/Connection/transaction
# receivers whose names vary — bare entries match any receiver via last-segment.
sql = [
    "executequery",     # JDBC Statement.executeQuery
    "executeupdate",    # JDBC Statement.executeUpdate
    "preparestatement", # JDBC Connection.prepareStatement
    "exec",             # Exposed Transaction.exec
]
route = []
